version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cms_mongodb_prod
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin@gmail.com
      - MONGO_INITDB_ROOT_PASSWORD=123456
    volumes:
      - mongodb_data_prod:/data/db
    command: ["mongod", "--bind_ip_all"]
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: cms_backend_prod
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongodb
    restart: always

volumes:
  mongodb_data_prod: