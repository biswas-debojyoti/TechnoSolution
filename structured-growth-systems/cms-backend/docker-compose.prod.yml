version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cms_mongodb_prod
    # NOTE: Intentionally not exposing ports to the host for production security.
    volumes:
      - mongodb_data_prod:/data/db
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: cms_backend_prod
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/cms_prod_db
    env_file:
      - .env
    depends_on:
      - mongodb
    restart: always

volumes:
  mongodb_data_prod:
