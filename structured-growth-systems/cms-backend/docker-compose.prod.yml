version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cms_mongodb_prod
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin@gmail.com
      - MONGO_INITDB_ROOT_PASSWORD=123456
    volumes:
      - mongodb_data_prod:/data/db
    command: ["mongod", "--bind_ip_all"]
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: cms_backend_prod
    ports:
      - "80:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://admin%40gmail.com:123456@mongodb:27017/cms_prod_db?authSource=admin
    env_file:
      - .env
    depends_on:
      - mongodb
    restart: always

  admin:
    build:
      context: ../cms-admin
      dockerfile: Dockerfile
    container_name: cms_admin_prod
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data_prod: